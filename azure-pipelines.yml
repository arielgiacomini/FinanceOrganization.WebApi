# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- main

pool:
  name: 'Default'
  # vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

stages:
 - stage: Build
   displayName: Build and Unit Testing  
   jobs:
   - job: "Build"
     steps:
     - task: NuGetToolInstaller@1
   
     - task: NuGetCommand@2
       inputs:
         restoreSolution: '$(solution)'
   
     - task: VSBuild@1
       inputs:
         solution: '$(solution)'
         msbuildArgs: '/p:DeployOnBuild=false /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:DesktopBuildPackageLocation="$(build.artifactStagingDirectory)\FinanceOrganization.WebApi.zip" /p:DeployIisAppPath="Default Web Site"'
         platform: '$(buildPlatform)'
         configuration: '$(buildConfiguration)'

   - job: "UnitTesting"
     dependsOn: Build
     displayName: Unit Testing
     steps:
     - task: VSTest@2
       displayName: Run unit testing
       inputs:
         platform: '$(buildPlatform)'
         configuration: '$(buildConfiguration)'

 - stage: DeployOnHml
   displayName: Deploy on hml
   jobs:
   - deployment:
     displayName: "Tasks to deploy"
     environment: "Approvers"
     pool: 
        # vmImage: 'windows-latest'
        name: 'Default'
     continueOnError: 'false'
     strategy:
       runOnce:
         deploy:      
           steps:
           - task: ExtractFiles@1
             displayName: Extract zip
             inputs:
               archiveFilePatterns: '$(build.artifactStagingDirectory)\FinanceOrganization.WebApi.zip'
               destinationFolder: '$(Build.ArtifactStagingDirectory)\extract'
               cleanDestinationFolder: true
               overwriteExistingFiles: true
   
           - task: FtpUpload@2
             displayName: Send FTP
             inputs:
               credentialsOption: 'inputs'
               serverUrl: 'ftp://arielgiacomini-003@WIN8130.SITE4NOW.NET'
               username: 'finance-organization-hml'
               password: 'finance-organization-hml'
               rootDirectory: '$(Build.ArtifactStagingDirectory)\extract'
               filePatterns: '**'
               remoteDirectory: '/api.finance.hml'
               #remoteDirectory: '/teste'
               enableUtf8: true
               clean: false
               cleanContents: false
               preservePaths: false
               trustSSL: false